<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname;

    // Quitar slash inicial
    var slug = path.replace(/^\/+/, "");

    // Si hay algo en la URL (slug válido)
    if (slug && slug !== "" && slug !== "404.html") {
      window.location.replace("/equipo.html?slug=" + slug);
    } else {
      window.location.replace("/");
    }
  </script>
</head>
<body></body>
</html>
