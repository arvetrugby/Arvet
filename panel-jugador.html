<h2>Mi Perfil</h2>
<button id="btnLogout">Cerrar sesión</button>
<div id="mensajePerfil" style="display:none;"></div>
<div style="margin-bottom:20px; text-align:center;">
  <img id="avatarPreview"
       src=""
       style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid #ddd;">
  <br><br>
  <input type="file" id="inputAvatar" accept="image/*" style="display:none;">
  <button type="button" id="btnCambiarAvatar">Cambiar foto</button>
</div>
<form id="formPerfil">

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">
<input type="email" id="email" placeholder="Email">
<input type="text" id="telefono" placeholder="Teléfono">
<input type="date" id="fechaNacimiento">
<input type="text" id="dni" placeholder="DNI">
<input type="text" id="cuitCuil" placeholder="CUIT/CUIL">
  

<button type="submit">Guardar cambios</button>

</form>
<hr>
<h3>Cambiar contraseña</h3>
<input type="password" id="nuevaPassword" placeholder="Nueva contraseña">
<button type="button" id="btnCambiarPass">Actualizar contraseña</button>

<script src="js/app.js"></script>
<script src="js/panel-jugador.js"></script>
