<div class="wave-background">

<svg viewBox="0 0 1440 400" preserveAspectRatio="none">
  
<style>
.wave1{ animation: waveMove1 18s linear infinite; }
.wave2{ animation: waveMove2 25s linear infinite; }

@keyframes waveMove1{
  0%{ transform: translateX(0); }
  100%{ transform: translateX(-300px); }
}

@keyframes waveMove2{
  0%{ transform: translateX(0); }
  100%{ transform: translateX(-600px); }
}
</style>

<rect width="100%" height="100%" fill="#0b1f44"/>

<path class="wave1"
fill="#1742ff"
opacity="0.35"
d="M0 200 
C200 150 400 250 600 200
C800 150 1000 250 1200 200
C1400 150 1600 250 1800 200
V400 H0 Z"/>

<path class="wave2"
fill="#22dd8a"
opacity="0.25"
d="M0 220
C200 180 400 260 600 220
C800 180 1000 260 1200 220
C1400 180 1600 260 1800 220
V400 H0 Z"/>

</svg>

</div>

<script>
const waves = document.querySelectorAll('.wave-background path');

window.addEventListener('mousemove', e => {
  const speed = e.clientX / window.innerWidth;
  waves.forEach((w,i)=>{
    w.style.transform = `translateX(${-speed*50*(i+1)}px)`;
  });
});
</script>
